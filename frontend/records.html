<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>银发健康助手 - 健康档案</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </head>
  <body>
    <main class="main">
      <!-- 页面标题 -->
      <section class="page-header">
        <div class="page-header__title">健康档案</div>
        <div class="page-header__subtitle">我的健康数据</div>
      </section>

      <!-- 关键指标卡片 - 老人最关心的数据 -->
      <section class="records-section">
        <div class="section-header">
          <span class="material-icons">favorite</span>
          <span class="section-title">关键健康指标</span>
        </div>

        <div class="key-stats">
          <div class="key-stat-card key-stat-card--bp">
            <div class="key-stat-card__icon">
              <span class="material-icons">monitor_heart</span>
            </div>
            <div class="key-stat-card__label">最近血压</div>
            <div class="key-stat-card__value" id="latestBp">--/--</div>
            <div class="key-stat-card__unit">mmHg</div>
            <div class="key-stat-card__status" id="bpStatus">暂无数据</div>
          </div>

          <div class="key-stat-card key-stat-card--bs">
            <div class="key-stat-card__icon">
              <span class="material-icons">bloodtype</span>
            </div>
            <div class="key-stat-card__label">最近血糖</div>
            <div class="key-stat-card__value" id="latestBs">--</div>
            <div class="key-stat-card__unit">mmol/L</div>
            <div class="key-stat-card__status" id="bsStatus">暂无数据</div>
          </div>

          <div class="key-stat-card key-stat-card--weight">
            <div class="key-stat-card__icon">
              <span class="material-icons">scale</span>
            </div>
            <div class="key-stat-card__label">最近体重</div>
            <div class="key-stat-card__value" id="latestWeight">--</div>
            <div class="key-stat-card__unit">kg</div>
            <div class="key-stat-card__status" id="weightStatus">暂无数据</div>
          </div>
        </div>
      </section>

      <!-- 标签切换 - 大按钮 -->
      <div class="records-tabs">
        <button class="records-tab records-tab--active" data-tab="bp">
          <span class="material-icons">monitor_heart</span>
          <span>血压</span>
        </button>
        <button class="records-tab" data-tab="bs">
          <span class="material-icons">bloodtype</span>
          <span>血糖</span>
        </button>
        <button class="records-tab" data-tab="weight">
          <span class="material-icons">scale</span>
          <span>体重</span>
        </button>
        <button class="records-tab" data-tab="medication">
          <span class="material-icons">pill</span>
          <span>用药</span>
        </button>
        <button class="records-tab" data-tab="exercise">
          <span class="material-icons">directions_run</span>
          <span>运动</span>
        </button>
        <button class="records-tab" data-tab="diet">
          <span class="material-icons">restaurant</span>
          <span>饮食</span>
        </button>
      </div>

      <!-- 图表区域 -->
      <section class="chart-section" id="chartSection">
        <div class="chart-range-tabs">
          <button class="chart-range-tab chart-range-tab--active" data-days="7">近7天</button>
          <button class="chart-range-tab" data-days="30">近30天</button>
        </div>
        <div class="chart-container">
          <canvas id="healthChart"></canvas>
        </div>
      </section>

      <!-- 记录列表 -->
      <section class="records-list-section">
        <div class="records-list" id="recordsList">
          <div class="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载记录...</div>
          </div>
        </div>
      </section>

      <!-- 底部导航栏 -->
      <nav class="bottom-nav">
        <button class="bottom-nav__item" onclick="navigateTo('home')">
          <span class="material-icons">home</span>
          <span class="bottom-nav__label">首页</span>
        </button>
        <button class="bottom-nav__item bottom-nav__item--active" onclick="navigateTo('records')">
          <span class="material-icons">folder</span>
          <span class="bottom-nav__label">健康档案</span>
        </button>
        <button class="bottom-nav__item" onclick="navigateTo('messages')">
          <span class="material-icons">message</span>
          <span class="bottom-nav__label">消息提醒</span>
        </button>
        <button class="bottom-nav__item" onclick="navigateTo('profile')">
          <span class="material-icons">person</span>
          <span class="bottom-nav__label">我的</span>
        </button>
      </nav>
    </main>

    <button class="emergency-btn" id="emergencyBtn" onclick="showEmergencyModal()">
      <span class="material-icons emergency-btn__icon">emergency</span>
      <span class="emergency-btn__text">紧急求助</span>
    </button>

    <div class="emergency-modal" id="emergencyModal">
      <div class="emergency-modal__overlay" onclick="hideEmergencyModal()"></div>
      <div class="emergency-modal__content">
        <div class="emergency-modal__header">
          <span class="material-icons emergency-modal__icon">warning</span>
          <span class="emergency-modal__title">紧急求助</span>
        </div>
        <div class="emergency-modal__body">
          <button class="emergency-option-btn" onclick="callEmergencyContact()">
            <span class="material-icons">phone</span>
            <span>拨打紧急联系人</span>
          </button>

        </div>
        <button class="emergency-modal__close" onclick="hideEmergencyModal()">
          取消
        </button>
      </div>
    </div>

    <script type="module" src="./records.js"></script>
  </body>
</html>
